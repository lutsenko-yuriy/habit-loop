name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Skip if this is a CI version-bump commit ──────────────────────────────
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Lint + unit tests (runs on push and PRs) ─────────────────────────────
  test:
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Firebase Dart config
        run: echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - name: Check formatting
        run: |
          find lib/ test/ -name "*.dart" \
            -not -name "firebase_options.dart" \
            -not -path "*/l10n/generated/*" \
            | sort | xargs dart format -l 120 --set-exit-if-changed
      - run: flutter analyze
      - run: flutter test

  # ── Resolve build number (push to main only) ─────────────────────────────
  resolve-version:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.resolve.outputs.version_name }}
      build_number: ${{ steps.resolve.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history

      - id: resolve
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_FULL=${VERSION_LINE#version: }
          VERSION_NAME=${VERSION_FULL%+*}
          PUBSPEC_BUILD=${VERSION_FULL#*+}

          # Highest build number recorded in any version-* git tag
          TAG_BUILD=$(git tag --list 'version-*' \
            | grep -oP '(?<=version-[0-9]+\.[0-9]+\.[0-9]+-)\d+' \
            | sort -n | tail -1)
          TAG_BUILD=${TAG_BUILD:-0}

          BUILD_NUMBER=$(( PUBSPEC_BUILD > TAG_BUILD ? PUBSPEC_BUILD : TAG_BUILD ))
          BUILD_NUMBER=$(( BUILD_NUMBER + 1 ))

          echo "version_name=$VERSION_NAME"  >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER"  >> "$GITHUB_OUTPUT"

  # ── Build signed Android AAB ──────────────────────────────────────────────
  build-android:
    needs: resolve-version
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.build.outputs.success }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore Firebase config files
        run: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICES_JSON"  | base64 --decode > android/app/google-services.json
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON:  ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Set up Android signing
        run: |
          echo "$KEY_STORE_BASE64" | base64 --decode > android/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../upload-keystore.jks\n' \
            "$KEY_STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > android/key.properties
        env:
          KEY_STORE_BASE64:    ${{ secrets.KEY_STORE_BASE64 }}
          KEY_STORE_PASSWORD:  ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD:        ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:           ${{ secrets.KEY_ALIAS }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - id: build
        run: |
          flutter build appbundle --release \
            --build-number=${{ needs.resolve-version.outputs.build_number }}
          flutter build apk --release \
            --build-number=${{ needs.resolve-version.outputs.build_number }}
          echo "success=true" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: steps.build.outputs.success == 'true'
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ── Distribute Android to Firebase App Distribution ───────────────────────
  distribute-android:
    needs: [resolve-version, build-android]
    if: needs.build-android.outputs.success == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Upload to Firebase App Distribution
        run: |
          if [[ -z "$FIREBASE_ANDROID_APP_ID" || -z "$FIREBASE_SERVICE_ACCOUNT_ANDROID" ]]; then
            echo "Missing FIREBASE_ANDROID_APP_ID or FIREBASE_SERVICE_ACCOUNT_ANDROID secret." >&2
            exit 1
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_ANDROID" > "$RUNNER_TEMP/firebase-service-account.json"
          firebase appdistribution:distribute app-release.apk \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --release-notes "Build ${{ needs.resolve-version.outputs.build_number }} — ${{ github.sha }}"
        env:
          FIREBASE_ANDROID_APP_ID:          ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_ANDROID: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANDROID }}
          GOOGLE_APPLICATION_CREDENTIALS:   ${{ runner.temp }}/firebase-service-account.json

  # ── Build signed iOS IPA ──────────────────────────────────────────────────
  build-ios:
    needs: resolve-version
    runs-on: macos-latest
    outputs:
      success: ${{ steps.build.outputs.success }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore Firebase config files
        run: |
          echo "$FIREBASE_OPTIONS_DART"     | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
        env:
          FIREBASE_OPTIONS_DART:       ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICE_INFO_PLIST:   ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          p12-password:    ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode \
            > "$PROFILES_DIR/ci.mobileprovision"

          # Extract UUID so ExportOptions.plist can reference the profile by UUID
          # (display name may differ from the filename we chose).
          security cms -D -i "$PROFILES_DIR/ci.mobileprovision" \
            > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /tmp/profile.plist)
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Generate ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>${IOS_TEAM_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.habitloop.habitLoop</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          EOF
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

      - id: build
        run: |
          # 1. Compile Dart + Flutter without code signing.
          # This also runs `pod install`. We avoid touching project.pbxproj
          # entirely (text injection silently failed in earlier attempts —
          # the file gets regenerated mid-build) and instead append signing
          # settings to ios/Flutter/Release.xcconfig, which is:
          #  - referenced via baseConfigurationReference ONLY by the Runner
          #    target's Release config, so settings are target-scoped and
          #    never leak to CocoaPods static-library targets;
          #  - a real file in the repo that flutter and CocoaPods don't
          #    regenerate (CocoaPods writes a separate Pods-Runner.release.xcconfig
          #    that this file `#include`s — those don't conflict);
          #  - lower priority than target-level buildSettings, but the Runner
          #    target's Release buildSettings have NO signing settings, so the
          #    xcconfig values become authoritative.
          flutter build ios --release --no-codesign \
            --build-number=${{ needs.resolve-version.outputs.build_number }}

          # 2. Append manual signing settings to Release.xcconfig.
          # Use both unconditional and [sdk=iphoneos*] conditional forms since
          # the project-level Release config sets CODE_SIGN_IDENTITY[sdk=iphoneos*]
          # = "iPhone Developer", which we need to override at the target level.
          cat >> ios/Flutter/Release.xcconfig <<XCCFG

          // Manual code signing for CI — appended by GitHub Actions.
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Apple Distribution
          CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = ${PROFILE_UUID}
          PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*] = ${PROFILE_UUID}
          DEVELOPMENT_TEAM = ${IOS_TEAM_ID}
          XCCFG

          echo '=== ios/Flutter/Release.xcconfig contents ==='
          cat ios/Flutter/Release.xcconfig
          echo '=== Provisioning profiles available to xcodebuild ==='
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo 'no profiles dir'
          echo '=== Codesign identities in keychain ==='
          security find-identity -v -p codesigning || true

          # 3. Archive — no signing flags at the command line. xcconfig from
          # baseConfigurationReference applies, target-scoped to Runner Release.
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath /tmp/Runner.xcarchive

          # 4. Export IPA using ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

          echo "success=true" >> "$GITHUB_OUTPUT"
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        if: steps.build.outputs.success == 'true'
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
          retention-days: 7

  # ── Distribute iOS to Firebase App Distribution ───────────────────────────
  distribute-ios:
    needs: [resolve-version, build-ios]
    if: needs.build-ios.outputs.success == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ios-release

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Upload to Firebase App Distribution
        run: |
          if [[ -z "$FIREBASE_IOS_APP_ID" || -z "$FIREBASE_SERVICE_ACCOUNT_IOS" ]]; then
            echo "Missing FIREBASE_IOS_APP_ID or FIREBASE_SERVICE_ACCOUNT_IOS secret." >&2
            exit 1
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_IOS" > "$RUNNER_TEMP/firebase-service-account.json"

          IPA_PATH=$(find . -maxdepth 1 -name "*.ipa" | head -1)
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA file found in downloaded artifact." >&2
            exit 1
          fi

          firebase appdistribution:distribute "$IPA_PATH" \
            --app "$FIREBASE_IOS_APP_ID" \
            --release-notes "Build ${{ needs.resolve-version.outputs.build_number }} — ${{ github.sha }}"
        env:
          FIREBASE_IOS_APP_ID:            ${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_IOS:   ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IOS }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json

  # ── Tag the release and bump pubspec build number ─────────────────────────
  version-tag:
    needs: [resolve-version, distribute-android, distribute-ios]
    if: |
      always() &&
      needs.resolve-version.result == 'success' &&
      (needs.distribute-android.result == 'success' || needs.distribute-ios.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump pubspec build number and push tag
        run: |
          BUILD=${{ needs.resolve-version.outputs.build_number }}
          VERSION=${{ needs.resolve-version.outputs.version_name }}

          ANDROID_OK="${{ needs.distribute-android.result }}"
          IOS_OK="${{ needs.distribute-ios.result }}"

          if [[ "$ANDROID_OK" == "success" && "$IOS_OK" == "success" ]]; then
            SUFFIX="both"
          elif [[ "$ANDROID_OK" == "success" ]]; then
            SUFFIX="android"
          elif [[ "$IOS_OK" == "success" ]]; then
            SUFFIX="ios"
          else
            echo "version-tag reached an unexpected state: android=$ANDROID_OK ios=$IOS_OK" >&2
            exit 1
          fi

          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump build number to ${BUILD} [skip ci]"
          git pull --rebase origin main   # absorb any commits that landed during the build
          git push

          git tag "version-${VERSION}-${BUILD}-${SUFFIX}"
          git push --tags
