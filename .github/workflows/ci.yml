name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual CI runs from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Skip if this is a CI version-bump commit ──────────────────────────────
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Lint + unit tests (runs on push and PRs) ─────────────────────────────
  test:
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + all tags needed for CHANGELOG lint

      - name: Python script tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -t scripts

      - name: Lint CHANGELOG markers
        run: |
          # Determine the last published version from git tags so only new
          # entries are checked.  Falls back to 0.0.0 on a fresh repo (no tags).
          LAST_VERSION=$(git tag --list 'version-*' \
            | grep -oP '(?<=version-)\d+\.\d+\.\d+' \
            | sort -V | tail -1)
          LAST_VERSION=${LAST_VERSION:-0.0.0}
          echo "Checking CHANGELOG entries newer than $LAST_VERSION"
          python3 scripts/changelog/lint.py docs/CHANGELOG.md "$LAST_VERSION"

      - name: Restore Firebase Dart config
        run: echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Check formatting
        run: |
          find lib/ test/ integration_test/ -name "*.dart" \
            -not -name "firebase_options.dart" \
            -not -path "*/l10n/generated/*" \
            | sort | xargs dart format -l 120 --set-exit-if-changed
      - run: flutter analyze
      - run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4.6.0
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Integration tests on iOS Simulator ───────────────────────────────────
  # Disabled — integration tests are run locally before merging (see AGENTS.md
  # workflow step 16). Re-enable with `if: needs.check-skip.outputs.should_skip != 'true'`
  # if CI coverage is desired in the future.
  test-ios-integration:
    needs: check-skip
    if: false
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Restore Firebase config files
        run: |
          echo "$FIREBASE_OPTIONS_DART"     | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
        env:
          FIREBASE_OPTIONS_DART:       ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICE_INFO_PLIST:   ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Keep CocoaPods as the plugin installer — same reason as build-ios.
      - run: flutter config --no-enable-swift-package-manager
      - run: flutter pub get
      - run: flutter gen-l10n

      - name: Boot iOS Simulator
        run: |
          # Pick the first available iPhone simulator and boot it.
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run iOS integration tests
        # Two-attempt retry covers transient simulator startup flakiness.
        run: |
          flutter test integration_test/ -d "$SIMULATOR_UDID" \
            || flutter test integration_test/ -d "$SIMULATOR_UDID"

  # ── Resolve build number (push to main, or manual workflow_dispatch) ────────
  resolve-version:
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.resolve.outputs.version_name }}
      build_number: ${{ steps.resolve.outputs.build_number }}
      release_notes: ${{ steps.release_notes.outputs.release_notes }}
      should_distribute: ${{ steps.should_distribute.outputs.should_distribute }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history + all version-* tags

      - id: resolve
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_FULL=${VERSION_LINE#version: }
          VERSION_NAME=${VERSION_FULL%+*}

          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            # Feature-branch test build — use 0 to avoid consuming a real build number.
            echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
            echo "build_number=0"             >> "$GITHUB_OUTPUT"
          else
            PUBSPEC_BUILD=${VERSION_FULL#*+}

            # Highest build number recorded in any version-* git tag
            TAG_BUILD=$(git tag --list 'version-*' \
              | grep -oP '(?<=version-[0-9]+\.[0-9]+\.[0-9]+-)\d+' \
              | sort -n | tail -1)
            TAG_BUILD=${TAG_BUILD:-0}

            BUILD_NUMBER=$(( PUBSPEC_BUILD > TAG_BUILD ? PUBSPEC_BUILD : TAG_BUILD ))
            BUILD_NUMBER=$(( BUILD_NUMBER + 1 ))

            echo "version_name=$VERSION_NAME"  >> "$GITHUB_OUTPUT"
            echo "build_number=$BUILD_NUMBER"  >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - id: last-published
        name: Resolve last published version
        run: |
          LAST_VERSION=$(git tag --list 'version-*' \
            | grep -oP '(?<=version-)\d+\.\d+\.\d+' \
            | sort -V | tail -1)
          LAST_VERSION=${LAST_VERSION:-0.0.0}
          echo "last_version=$LAST_VERSION" >> "$GITHUB_OUTPUT"
          echo "Last published version: $LAST_VERSION"

      - id: release_notes
        name: Generate release notes
        run: |
          LAST_VERSION=${{ steps.last-published.outputs.last_version }}

          # Generate human-readable notes and write to a file for the artifact.
          python3 scripts/changelog/release_notes.py docs/CHANGELOG.md "$LAST_VERSION" \
            > release-notes.txt

          echo "=== Release notes preview ==="
          cat release-notes.txt

          # Emit as a multiline output using a random delimiter to avoid any
          # chance that note content matches the delimiter line.
          DELIM=$(head -c 12 /dev/urandom | base64 | tr -d '=+/')
          echo "release_notes<<$DELIM" >> "$GITHUB_OUTPUT"
          cat release-notes.txt       >> "$GITHUB_OUTPUT"
          echo "$DELIM"               >> "$GITHUB_OUTPUT"

      - id: should_distribute
        name: Check if distribution is needed
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_distribute=true" >> "$GITHUB_OUTPUT"
            echo "Distribution needed: true (workflow_dispatch override)"
          else
            LAST_VERSION=${{ steps.last-published.outputs.last_version }}
            RESULT=$(python3 scripts/changelog/distribute.py docs/CHANGELOG.md "$LAST_VERSION")
            echo "should_distribute=$RESULT" >> "$GITHUB_OUTPUT"
            echo "Distribution needed: $RESULT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.txt
          retention-days: 90

  # ── Build signed Android AAB ──────────────────────────────────────────────
  build-android:
    needs: resolve-version
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.build.outputs.success }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore Firebase config files
        run: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICES_JSON"  | base64 --decode > android/app/google-services.json
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON:  ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Set up Android signing
        run: |
          echo "$KEY_STORE_BASE64" | base64 --decode > android/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../upload-keystore.jks\n' \
            "$KEY_STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > android/key.properties
        env:
          KEY_STORE_BASE64:    ${{ secrets.KEY_STORE_BASE64 }}
          KEY_STORE_PASSWORD:  ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD:        ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:           ${{ secrets.KEY_ALIAS }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter gen-l10n

      - id: build
        run: |
          flutter build appbundle --release \
            --build-number=${{ needs.resolve-version.outputs.build_number }}
          flutter build apk --release \
            --build-number=${{ needs.resolve-version.outputs.build_number }}
          echo "success=true" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: steps.build.outputs.success == 'true'
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ── Distribute Android to Firebase App Distribution ───────────────────────
  distribute-android:
    needs: [resolve-version, build-android]
    if: needs.build-android.outputs.success == 'true' && needs.resolve-version.outputs.should_distribute == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: android-release

      - name: Upload to Firebase App Distribution
        env:
          APP_ID:               ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          ARTIFACT_PATH:        app-release.apk
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANDROID }}
          RELEASE_NOTES:        ${{ needs.resolve-version.outputs.release_notes }}
          GROUP_ALIAS:          internal-testers
        run: bash scripts/firebase/distribute.sh

  # ── Build signed iOS IPA ──────────────────────────────────────────────────
  build-ios:
    needs: resolve-version
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    outputs:
      success: ${{ steps.build.outputs.success }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore Firebase config files
        run: |
          echo "$FIREBASE_OPTIONS_DART"     | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
        env:
          FIREBASE_OPTIONS_DART:       ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICE_INFO_PLIST:   ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          p12-password:    ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode \
            > "$PROFILES_DIR/ci.mobileprovision"

          # Extract UUID so ExportOptions.plist can reference the profile by UUID
          # (display name may differ from the filename we chose).
          security cms -D -i "$PROFILES_DIR/ci.mobileprovision" \
            > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /tmp/profile.plist)
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Opt out of Flutter's Swift Package Manager integration so that all
      # plugins — including firebase_crashlytics — are installed via CocoaPods.
      # Without this, newer Flutter stable builds use SPM for plugins that
      # support it, which means ios/Pods/FirebaseCrashlytics/ is never created
      # and the "Crashlytics dSYM Upload" Xcode build phase fails with
      # "Pods/FirebaseCrashlytics/run: No such file or directory".
      - run: flutter config --no-enable-swift-package-manager

      - run: flutter pub get
      - run: flutter gen-l10n

      # No CocoaPods caching — correctness over speed. flutter build ios
      # generates .flutter-plugins-dependencies (with correct CI pub-cache
      # paths) before running pod install, so all Firebase plugins are always
      # installed fresh. Caching ios/Pods or ~/Library/Caches/CocoaPods caused
      # stale state in earlier attempts.

      # Refresh the CocoaPods specs index so pod install can resolve the
      # current flutter_timezone pod version. The macOS runner's specs cache
      # may be stale when a plugin bumps its podspec after the image was baked.
      - name: Update CocoaPods specs
        run: pod repo update

      - name: Generate ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>${IOS_TEAM_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.habitloop.habitLoop</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          EOF
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

      - id: build
        run: |
          # 1. Compile Dart + Flutter without code signing.
          # flutter build ios generates .flutter-plugins-dependencies (with the
          # correct CI pub-cache paths) before running pod install internally,
          # so all Firebase plugins are installed and Pods/FirebaseCrashlytics/run
          # is present when Xcode's build phase scripts execute.
          #
          # We append signing settings to ios/Flutter/Release.xcconfig rather
          # than touching project.pbxproj (which gets regenerated mid-build).
          # The xcconfig is referenced via baseConfigurationReference only by
          # the Runner target's Release config, so settings are target-scoped
          # and never leak to CocoaPods static-library targets.
          flutter build ios --release --no-codesign \
            --build-number=${{ needs.resolve-version.outputs.build_number }}

          # 2. Append manual signing settings to Release.xcconfig.
          # Use both unconditional and [sdk=iphoneos*] conditional forms since
          # the project-level Release config sets CODE_SIGN_IDENTITY[sdk=iphoneos*]
          # = "iPhone Developer", which we need to override at the target level.
          cat >> ios/Flutter/Release.xcconfig <<XCCFG

          // Manual code signing for CI — appended by GitHub Actions.
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Apple Distribution
          CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = ${PROFILE_UUID}
          PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*] = ${PROFILE_UUID}
          DEVELOPMENT_TEAM = ${IOS_TEAM_ID}
          XCCFG

          echo '=== ios/Flutter/Release.xcconfig contents ==='
          cat ios/Flutter/Release.xcconfig
          echo '=== Provisioning profiles available to xcodebuild ==='
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo 'no profiles dir'
          echo '=== Codesign identities in keychain ==='
          security find-identity -v -p codesigning || true

          # 3. Archive — no signing flags at the command line. xcconfig from
          # baseConfigurationReference applies, target-scoped to Runner Release.
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath /tmp/Runner.xcarchive

          # 4. Export IPA using ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

          echo "success=true" >> "$GITHUB_OUTPUT"
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        if: steps.build.outputs.success == 'true'
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
          retention-days: 7

  # ── Distribute iOS to Firebase App Distribution ───────────────────────────
  distribute-ios:
    needs: [resolve-version, build-ios]
    if: needs.build-ios.outputs.success == 'true' && needs.resolve-version.outputs.should_distribute == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ios-release

      - name: Upload to Firebase App Distribution
        env:
          APP_ID:               ${{ secrets.FIREBASE_IOS_APP_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IOS }}
          RELEASE_NOTES:        ${{ needs.resolve-version.outputs.release_notes }}
          GROUP_ALIAS:          internal-testers
        run: |
          ARTIFACT_PATH=$(find . -maxdepth 1 -name "*.ipa" | head -1)
          [[ -n "$ARTIFACT_PATH" ]] || { echo "No IPA found in artifact" >&2; exit 1; }
          export ARTIFACT_PATH
          bash scripts/firebase/distribute.sh

  # ── Tag the release and bump pubspec build number ─────────────────────────
  version-tag:
    needs: [resolve-version, build-android, build-ios, distribute-android, distribute-ios]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.resolve-version.result == 'success' &&
      (needs.build-android.outputs.success == 'true' || needs.build-ios.outputs.success == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump pubspec build number and push tag
        run: |
          BUILD=${{ needs.resolve-version.outputs.build_number }}
          VERSION=${{ needs.resolve-version.outputs.version_name }}

          ANDROID_OK="${{ needs.distribute-android.result }}"
          IOS_OK="${{ needs.distribute-ios.result }}"

          if [[ "$ANDROID_OK" == "success" && "$IOS_OK" == "success" ]]; then
            SUFFIX="both"
          elif [[ "$ANDROID_OK" == "success" ]]; then
            SUFFIX="android"
          elif [[ "$IOS_OK" == "success" ]]; then
            SUFFIX="ios"
          elif [[ "${{ needs.resolve-version.outputs.should_distribute }}" == "false" ]]; then
            # Distribution intentionally skipped: no [user] or [app] change.
            SUFFIX="none"
          else
            echo "version-tag: distribution was expected but no platform succeeded: android=$ANDROID_OK ios=$IOS_OK" >&2
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull first so our sed change applies on top of the current main,
          # avoiding a rebase conflict when another build-number bump landed
          # while this job was waiting for distribute-android/-ios to finish.
          git pull --rebase origin main

          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          git add pubspec.yaml
          git commit -m "chore: bump build number to ${BUILD} [skip ci]"
          git push

          git tag "version-${VERSION}-${BUILD}-${SUFFIX}"
          git push --tags
