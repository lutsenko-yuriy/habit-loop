name: full-release-cycle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      android:
        description: 'Android'
        type: boolean
        default: true
      ios:
        description: 'iOS'
        type: boolean
        default: true
      environment:
        description: 'Environment'
        type: choice
        options: [production, staging]
        default: production
      distribute_firebase:
        description: 'Distribute to Firebase App Distribution — Android only (production only)'
        type: boolean
        default: true
      distribute_testflight:
        description: 'Distribute to TestFlight — iOS only (production only)'
        type: boolean
        default: true
      run_scenarios:
        description: 'Run integration scenarios (Android emulator)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Skip if this is a CI version-bump commit; also determine build gate ───
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.ci-skip.outputs.should_skip }}
      should_build: ${{ steps.build-gate.outputs.should_build }}
      build_android: ${{ steps.dispatch-plan.outputs.build_android }}
      build_ios: ${{ steps.dispatch-plan.outputs.build_ios }}
      distribute_android: ${{ steps.dispatch-plan.outputs.distribute_android }}
      distribute_testflight: ${{ steps.dispatch-plan.outputs.distribute_testflight }}
      group_alias: ${{ steps.dispatch-plan.outputs.group_alias }}
    steps:
      - id: ci-skip
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.ci-skip.outputs.should_skip != 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: steps.ci-skip.outputs.should_skip != 'true'
        with:
          python-version: '3.12'

      - id: build-gate
        if: steps.ci-skip.outputs.should_skip != 'true'
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Build gate: true (workflow_dispatch override)"
          else
            LAST_VERSION=$(git tag --list 'version-*' \
              | grep -oP '(?<=version-)\d+\.\d+\.\d+' \
              | sort -V | tail -1)
            LAST_VERSION=${LAST_VERSION:-0.0.0}
            echo "Last published version: $LAST_VERSION"
            RESULT=$(python3 scripts/changelog/distribute.py docs/CHANGELOG.md "$LAST_VERSION")
            echo "should_build=$RESULT" >> "$GITHUB_OUTPUT"
            echo "Build gate: $RESULT"
          fi

      - id: dispatch-plan
        if: steps.ci-skip.outputs.should_skip != 'true'
        run: |
          python3 scripts/ci/dispatch_plan.py \
            --event "${{ github.event_name }}" \
            --android "${{ github.event.inputs.android || 'true' }}" \
            --ios "${{ github.event.inputs.ios || 'true' }}" \
            --environment "${{ github.event.inputs.environment || 'production' }}" \
            --distribute-firebase "${{ github.event.inputs.distribute_firebase || 'true' }}" \
            --distribute-testflight "${{ github.event.inputs.distribute_testflight || 'true' }}" \
            >> "$GITHUB_OUTPUT"

  # ── Lint + unit tests (runs on push and PRs) ─────────────────────────────
  test:
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + all tags needed for CHANGELOG lint

      - uses: ./.github/actions/run-tests
        with:
          firebase-options-dart: ${{ secrets.FIREBASE_OPTIONS_DART }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  # ── Integration tests on iOS Simulator ───────────────────────────────────
  # Disabled — integration tests are run locally before merging (see AGENTS.md
  # workflow step 16). Re-enable with `if: needs.check-skip.outputs.should_skip != 'true'`
  # if CI coverage is desired in the future.
  # ── Resolve build number (push to main, or manual workflow_dispatch) ────────
  resolve-version:
    needs: [check-skip, test]
    if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.check-skip.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.resolve.outputs.version_name }}
      build_number: ${{ steps.resolve.outputs.build_number }}
      release_notes: ${{ steps.resolve.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history + all version-* tags

      - id: resolve
        uses: ./.github/actions/resolve-version
        with:
          is-main-release: ${{ github.ref == 'refs/heads/main' && github.event.inputs.environment != 'staging' }}

  # ── Build signed Android AAB ──────────────────────────────────────────────
  build-android:
    needs: [check-skip, resolve-version]
    if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.check-skip.outputs.build_android == 'true'
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.build.outputs.success }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/restore-firebase-config
        with:
          platform: android
          firebase-options-dart: ${{ secrets.FIREBASE_OPTIONS_DART }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - uses: ./.github/actions/setup-flutter

      - id: build
        uses: ./.github/actions/build-android-app
        with:
          environment: ${{ github.event.inputs.environment || 'production' }}
          build-number: ${{ needs.resolve-version.outputs.build_number }}
          key-store-base64: ${{ secrets.KEY_STORE_BASE64 }}
          key-store-password: ${{ secrets.KEY_STORE_PASSWORD }}
          key-password: ${{ secrets.KEY_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}

      - uses: actions/upload-artifact@v4
        if: steps.build.outputs.success == 'true'
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/${{ steps.build.outputs.apk_name }}
          retention-days: 7

  # ── Run integration scenarios on Android emulator ────────────────────────
  run-scenarios:
    needs: [check-skip, build-android]
    if: |
      always() &&
      needs.check-skip.outputs.should_skip != 'true' &&
      (
        (github.ref == 'refs/heads/main' && needs.build-android.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_scenarios == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/run-scenarios
        with:
          firebase-options-dart: ${{ secrets.FIREBASE_OPTIONS_DART }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}
          gist-token: ${{ secrets.GIST_TOKEN }}
          gist-id: ${{ vars.SCENARIOS_GIST_ID }}

  # ── Distribute Android to Firebase App Distribution ───────────────────────
  distribute-android:
    needs: [check-skip, resolve-version, build-android]
    if: needs.build-android.outputs.success == 'true' && needs.check-skip.outputs.distribute_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: android-release

      - name: Upload to Firebase App Distribution
        env:
          APP_ID:               ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          ARTIFACT_PATH:        app-release.apk
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANDROID }}
          RELEASE_NOTES:        ${{ needs.resolve-version.outputs.release_notes }}
          GROUP_ALIAS:          ${{ needs.check-skip.outputs.group_alias }}
        run: bash scripts/firebase/distribute.sh

  # ── Build signed iOS IPA ──────────────────────────────────────────────────
  build-ios:
    needs: [check-skip, resolve-version]
    if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.check-skip.outputs.build_ios == 'true'
    runs-on: macos-26
    outputs:
      success: ${{ steps.build.outputs.success }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/restore-firebase-config
        with:
          platform: ios
          firebase-options-dart: ${{ secrets.FIREBASE_OPTIONS_DART }}
          google-service-info-plist: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - uses: ./.github/actions/setup-flutter
        with:
          enable-swift-package-manager: 'false'

      - id: build
        uses: ./.github/actions/build-ios-app
        with:
          environment: ${{ github.event.inputs.environment || 'production' }}
          build-number: ${{ needs.resolve-version.outputs.build_number }}
          ios-certificate-p12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          ios-certificate-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          ios-appstore-provisioning-profile: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE }}
          ios-team-id: ${{ secrets.IOS_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        if: steps.build.outputs.success == 'true' && github.event.inputs.environment != 'staging'
        with:
          name: ios-appstore
          path: build/ios/ipa-appstore/*.ipa
          retention-days: 7

  # ── Distribute iOS to TestFlight (internal testing) ────────────────────────
  distribute-testflight:
    needs: [check-skip, build-ios]
    if: needs.build-ios.outputs.success == 'true' && needs.check-skip.outputs.distribute_testflight == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ios-appstore

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          ARTIFACT_PATH=$(find . -maxdepth 1 -name "*.ipa" | head -1)
          [[ -n "$ARTIFACT_PATH" ]] || { echo "No IPA found in artifact" >&2; exit 1; }
          export ARTIFACT_PATH
          bash scripts/appstore/testflight_upload.sh

  # ── Set TestFlight "What's New" via the App Store Connect REST API ────────
  # Isolated from distribute-testflight: waits (up to 30 min) for Apple to
  # finish processing the build, then PATCHes betaBuildLocalizations. Soft-
  # fails (continue-on-error, and the script itself exits 0) so a slow/failed
  # notes update never blocks version-tag — the binary is already uploaded by
  # this point.
  set-testflight-notes:
    needs: [check-skip, resolve-version, distribute-testflight]
    if: needs.distribute-testflight.result == 'success' && needs.check-skip.outputs.distribute_testflight == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyjwt cryptography

      - name: Set TestFlight What's New
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          BUILD_NUMBER:                 ${{ needs.resolve-version.outputs.build_number }}
          VERSION_NAME:                 ${{ needs.resolve-version.outputs.version_name }}
          RELEASE_NOTES:                ${{ needs.resolve-version.outputs.release_notes }}
        run: python3 scripts/appstore/set_testflight_whatsnew.py

  # ── Tag the release and bump pubspec build number ─────────────────────────
  # Gates on *either* distribute-android or distribute-testflight succeeding
  # (not both) — a failure on one platform's distribution must never block
  # tagging the release on the other's account.
  version-tag:
    needs: [resolve-version, build-android, build-ios, distribute-android, distribute-testflight]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.resolve-version.result == 'success' &&
      (needs.distribute-android.result == 'success' || needs.distribute-testflight.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump pubspec build number and push tag
        run: |
          BUILD=${{ needs.resolve-version.outputs.build_number }}
          VERSION=${{ needs.resolve-version.outputs.version_name }}

          ANDROID_OK="${{ needs.distribute-android.result }}"
          IOS_OK="${{ needs.distribute-testflight.result }}"

          if [[ "$ANDROID_OK" == "success" && "$IOS_OK" == "success" ]]; then
            SUFFIX="both"
          elif [[ "$ANDROID_OK" == "success" ]]; then
            SUFFIX="android"
          elif [[ "$IOS_OK" == "success" ]]; then
            SUFFIX="ios"
          else
            echo "version-tag: no platform succeeded: android=$ANDROID_OK ios=$IOS_OK" >&2
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull first so our sed change applies on top of the current main,
          # avoiding a rebase conflict when another build-number bump landed
          # while this job was waiting for distribute-android/-testflight to
          # finish.
          git pull --rebase origin main

          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          git add pubspec.yaml
          git commit -m "chore: bump build number to ${BUILD} [skip ci]"
          git push

          git tag "version-${VERSION}-${BUILD}-${SUFFIX}"
          git push --tags
