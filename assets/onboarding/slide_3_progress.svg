<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240">
  <!-- Background -->
  <circle cx="160" cy="120" r="90" fill="#E0F2F1"/>

  <!-- Chart baseline -->
  <line x1="100" y1="168" x2="224" y2="168" stroke="#004D40" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="168" x2="100" y2="76" stroke="#004D40" stroke-width="3" stroke-linecap="round"/>

  <!-- Bars -->
  <rect x="110" y="148" width="20" height="20" rx="3" fill="#8BC34A" opacity="0.7"/>
  <rect x="138" y="128" width="20" height="40" rx="3" fill="#8BC34A" opacity="0.85"/>
  <rect x="166" y="108" width="20" height="60" rx="3" fill="#00796B"/>
  <rect x="194" y="90" width="20" height="78" rx="3" fill="#00796B"/>

  <!-- Trend line -->
  <polyline points="120,144 148,124 176,104 204,86"
            fill="none" stroke="#FFB74D" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="none"/>

  <!-- Trend dots -->
  <circle cx="120" cy="144" r="5" fill="#FFB74D"/>
  <circle cx="148" cy="124" r="5" fill="#FFB74D"/>
  <circle cx="176" cy="104" r="5" fill="#FFB74D"/>
  <circle cx="204" cy="86" r="7" fill="#FFB74D" stroke="white" stroke-width="2"/>

  <!-- Star burst at top -->
  <polygon points="204,72 207,80 216,80 209,85 212,94 204,89 196,94 199,85 192,80 201,80"
           fill="#FFB74D"/>
</svg>
