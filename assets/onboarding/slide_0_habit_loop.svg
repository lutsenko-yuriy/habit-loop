  <polygon points="92,148 98,172 116,160" fill="#00796B"/>

  <!-- Inner circle -->
  <circle cx="160" cy="120" r="38" fill="#004D40"/>

  <!-- Loop icon inside -->
  <path d="M 148 120 A 12 12 0 1 1 160 132" fill="none" stroke="#8BC34A" stroke-width="4" stroke-linecap="round"/>
  <polygon points="156,126 164,130 162,120" fill="#8BC34A"/>

  <!-- Habit dots along top arc -->
  <circle cx="160" cy="50" r="6" fill="#FFB74D"/>
  <circle cx="218" cy="72" r="6" fill="#8BC34A"/>
  <circle cx="232" cy="130" r="6" fill="#00796B"/>
