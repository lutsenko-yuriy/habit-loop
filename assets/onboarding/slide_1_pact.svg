<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240">
  <!-- Background -->
  <circle cx="160" cy="120" r="90" fill="#E0F2F1"/>

  <!-- Left hand -->
  <rect x="72" y="108" width="20" height="36" rx="6" fill="#004D40"/>
  <rect x="76" y="88" width="12" height="28" rx="6" fill="#004D40"/>
  <rect x="64" y="96" width="12" height="22" rx="6" fill="#004D40"/>
  <rect x="88" y="92" width="12" height="24" rx="6" fill="#004D40"/>

  <!-- Right hand (mirror) -->
  <rect x="228" y="108" width="20" height="36" rx="6" fill="#004D40"/>
  <rect x="232" y="88" width="12" height="28" rx="6" fill="#004D40"/>
  <rect x="244" y="96" width="12" height="22" rx="6" fill="#004D40"/>
  <rect x="220" y="92" width="12" height="24" rx="6" fill="#004D40"/>

  <!-- Clasped center -->
  <ellipse cx="160" cy="120" rx="30" ry="20" fill="#00796B"/>
  <ellipse cx="160" cy="118" rx="22" ry="14" fill="#8BC34A"/>

  <!-- Checkmark on clasped hands -->
  <polyline points="150,118 157,126 172,110" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stars -->
  <circle cx="130" cy="78" r="5" fill="#FFB74D"/>
  <circle cx="192" cy="72" r="4" fill="#FFB74D"/>
  <circle cx="210" cy="92" r="3" fill="#FFB74D"/>
</svg>
