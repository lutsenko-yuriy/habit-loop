  firebase_remote_config: ^5.0.0
  talker_flutter: ^5.1.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4

flutter:
  generate: true
  uses-material-design: true
